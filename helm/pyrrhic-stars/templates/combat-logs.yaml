{{- if .Values.combatLogs.enabled -}}
{{- $cl := .Values.combatLogs -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pyrrhic-stars.fullname" . }}-combat-logs
  labels:
    {{- include "pyrrhic-stars.labels" . | nindent 4 }}
    app.kubernetes.io/component: combat-logs
spec:
  replicas: {{ $cl.replicaCount }}
  selector:
    matchLabels:
      {{- include "pyrrhic-stars.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: combat-logs
  template:
    metadata:
      labels:
        {{- include "pyrrhic-stars.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: combat-logs
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/combat-logs-config.yaml") . | sha256sum }}
        {{- with $cl.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pyrrhic-stars.serviceAccountName" . }}
      securityContext:
        {{- toYaml $cl.podSecurityContext | nindent 8 }}
      containers:
        - name: combat-logs
          image: {{ include "pyrrhic-stars.image" (dict "root" . "repository" .Values.image.combatLogs.repository "tag" .Values.image.combatLogs.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml $cl.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ $cl.port }}
              protocol: TCP
          {{- with $cl.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $cl.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml $cl.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "pyrrhic-stars.fullname" . }}-combat-logs
      {{- with $cl.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $cl.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $cl.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pyrrhic-stars.fullname" . }}-combat-logs
  labels:
    {{- include "pyrrhic-stars.labels" . | nindent 4 }}
    app.kubernetes.io/component: combat-logs
  {{- with $cl.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $cl.service.type }}
  selector:
    {{- include "pyrrhic-stars.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: combat-logs
  ports:
    - name: http
      port: {{ $cl.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
