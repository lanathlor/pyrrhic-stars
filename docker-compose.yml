services:
  gateway:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    command: ["-c", ".air.gateway.toml"]
    ports:
      - "7777:7777"
    volumes:
      - ./server:/app
      - ./shared:/shared
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      POSTGRES_DSN: postgres://codex:codex@postgres:5432/codex?sslmode=disable
      CODEX_LEVELS_DIR: /shared/levels

  zone:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    command: ["-c", ".air.zone.toml"]
    ports:
      - "8081:8081"
    volumes:
      - ./server:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      POSTGRES_DSN: postgres://codex:codex@postgres:5432/codex?sslmode=disable

  chat:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    command: ["-c", ".air.chat.toml"]
    ports:
      - "8082:8082"
    volumes:
      - ./server:/app
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: codex
      POSTGRES_PASSWORD: codex
      POSTGRES_DB: codex
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codex"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
  postgres_data:
