services:
    gateway:
        build:
            context: ./server
            dockerfile: Dockerfile.dev
        command: ['-c', '.air.gateway.toml']
        ports:
            - '7777:7777'
            - '7778:7778/udp'
        volumes:
            - ./server:/app
            - ./shared:/shared
        depends_on:
            redis:
                condition: service_healthy
            clickhouse:
                condition: service_healthy
            postgres:
                condition: service_healthy
            kratos:
                condition: service_started
        environment:
            CODEX_DEV: '1'
            REDIS_ADDR: redis:6379
            DB_DRIVER: postgres
            POSTGRES_DSN: postgres://codex:codex@postgres:5432/codex?sslmode=disable
            KRATOS_PUBLIC_URL: http://kratos:4433
            CODEX_LEVELS_DIR: /shared/levels
            CODEX_MOBS_DIR: /shared/mobs
            CLICKHOUSE_ADDR: clickhouse:9000
            CLICKHOUSE_DB: codex
            CLICKHOUSE_USER: codex
            CLICKHOUSE_PASSWORD: codex

    zone:
        build:
            context: ./server
            dockerfile: Dockerfile.dev
        command: ['-c', '.air.zone.toml']
        ports:
            - '8081:8081'
        volumes:
            - ./server:/app
        depends_on:
            redis:
                condition: service_healthy
            postgres:
                condition: service_healthy
        environment:
            REDIS_ADDR: redis:6379
            POSTGRES_DSN: postgres://codex:codex@postgres:5432/codex?sslmode=disable

    chat:
        build:
            context: ./server
            dockerfile: Dockerfile.dev
        command: ['-c', '.air.chat.toml']
        ports:
            - '8082:8082'
        volumes:
            - ./server:/app
        depends_on:
            redis:
                condition: service_healthy
        environment:
            REDIS_ADDR: redis:6379

    # Idempotently create the dedicated `kratos` database (works on both fresh
    # and pre-existing postgres volumes, unlike docker-entrypoint-initdb.d which
    # only runs on first init).
    kratos-createdb:
        image: postgres:16-alpine
        entrypoint:
            - sh
            - -c
            - >
                psql "postgres://codex:codex@postgres:5432/postgres?sslmode=disable"
                -tc "SELECT 1 FROM pg_database WHERE datname='kratos'"
                | grep -q 1 ||
                psql "postgres://codex:codex@postgres:5432/postgres?sslmode=disable"
                -c "CREATE DATABASE kratos"
        depends_on:
            postgres:
                condition: service_healthy
        restart: on-failure

    kratos-migrate:
        image: oryd/kratos:v1.3.1
        command: migrate sql -e --yes
        volumes:
            - ./ops/kratos:/etc/config/kratos:ro
        environment:
            DSN: postgres://codex:codex@postgres:5432/kratos?sslmode=disable
        depends_on:
            kratos-createdb:
                condition: service_completed_successfully
        restart: on-failure

    kratos:
        image: oryd/kratos:v1.3.1
        command: serve --config /etc/config/kratos/kratos.yml --dev --watch-courier
        ports:
            - '4433:4433'
            - '4434:4434'
        volumes:
            - ./ops/kratos:/etc/config/kratos:ro
        environment:
            DSN: postgres://codex:codex@postgres:5432/kratos?sslmode=disable
        depends_on:
            postgres:
                condition: service_healthy
            kratos-migrate:
                condition: service_completed_successfully
        restart: unless-stopped

    combat-logs:
        image: node:22-alpine
        working_dir: /app
        command: sh -c "corepack enable && corepack prepare pnpm@10.11.0 --activate && pnpm install && pnpm run dev"
        ports:
            - '5180:5180'
        volumes:
            - ./web/combat-logs:/app
            - combat_logs_node_modules:/app/node_modules
        depends_on:
            - gateway

    landing:
        image: node:22-alpine
        working_dir: /app
        command: sh -c "corepack enable && corepack prepare pnpm@10.11.0 --activate && pnpm install && pnpm run dev --host 0.0.0.0"
        ports:
            - '4321:4321'
        volumes:
            - ./web/landing:/app
            - landing_node_modules:/app/node_modules
        environment:
            PUBLIC_SITE_URL: http://localhost:4321
            PUBLIC_REPO_URL: ${PUBLIC_REPO_URL:-https://gitlab.com/master-monkey/mmorpg}
            PUBLIC_DISCORD_URL: ${PUBLIC_DISCORD_URL:-}
            PUBLIC_DOWNLOAD_LINUX: ${PUBLIC_DOWNLOAD_LINUX:-}
            PUBLIC_DOWNLOAD_WINDOWS: ${PUBLIC_DOWNLOAD_WINDOWS:-}
            PUBLIC_STEAM_URL: ${PUBLIC_STEAM_URL:-}

    # grafana:
    #   image: grafana/grafana:latest
    #   ports:
    #     - "3000:3000"
    #   volumes:
    #     - grafana_data:/var/lib/grafana
    #     - ./grafana/provisioning:/etc/grafana/provisioning
    #     - ./grafana/dashboards:/var/lib/grafana/dashboards
    #   environment:
    #     GF_SECURITY_ADMIN_USER: admin
    #     GF_SECURITY_ADMIN_PASSWORD: admin
    #     GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    #   depends_on:
    #     clickhouse:
    #       condition: service_healthy

    clickhouse:
        image: clickhouse/clickhouse-server:24-alpine
        ports:
            - '9000:9000'
            - '8123:8123'
        volumes:
            - clickhouse_data:/var/lib/clickhouse
        environment:
            CLICKHOUSE_DB: codex
            CLICKHOUSE_USER: codex
            CLICKHOUSE_PASSWORD: codex
        healthcheck:
            test: ['CMD', 'clickhouse-client', '--query', 'SELECT 1']
            interval: 5s
            timeout: 3s
            retries: 5

    redis:
        image: redis:7-alpine
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 3

    postgres:
        image: postgres:16-alpine
        volumes:
            - postgres_data:/var/lib/postgresql/data
        environment:
            POSTGRES_USER: codex
            POSTGRES_PASSWORD: codex
            POSTGRES_DB: codex
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U codex']
            interval: 5s
            timeout: 3s
            retries: 3

volumes:
    redis_data:
    postgres_data:
    clickhouse_data:
    grafana_data:
    combat_logs_node_modules:
    landing_node_modules:
