items:
  # --- Equipped starter gear (ilvl 1) ---
  # Values represent stat contribution at ilvl 50 (BiS reference).
  # At ilvl 1, scaling factor is ~0.025-0.14 depending on stat,
  # so these items contribute nearly nothing (nearly naked).

  - id: frame_basic
    name: Standard Frame
    slot: 0 # Frame
    stat_lines:
      - { stat: 0, value: 90 }  # Hull (primary)
      - { stat: 2, value: 12 }  # Plating (secondary)
      - { stat: 0, value: 20 }  # Hull (flex)

  - id: core_basic
    name: Standard Power Core
    slot: 1 # Power Core
    stat_lines:
      - { stat: 1, value: 22 }  # Output (primary)
      - { stat: 3, value: 12 }  # Tempo (secondary)
      - { stat: 1, value: 8 }   # Output (flex)

  - id: weapon_basic
    name: Standard Weapon
    slot: 2 # Primary Weapon
    stat_lines:
      - { stat: 1, value: 25 }  # Output (primary)
      - { stat: 5, value: 18 }  # Mastery (secondary)
      - { stat: 1, value: 8 }   # Output (flex)

  - id: tool_basic
    name: Standard Sidearm
    slot: 3 # Secondary / Tool
    stat_lines:
      - { stat: 1, value: 12 }  # Output (primary, smaller)
      - { stat: 4, value: 16 }  # Identity (secondary)
      - { stat: 4, value: 8 }   # Identity (flex)

  - id: augment_basic
    name: Standard Augment
    slot: 4 # Augment
    stat_lines:
      - { stat: 5, value: 22 }  # Mastery (primary)
      - { stat: 4, value: 12 }  # Identity (secondary)
      - { stat: 3, value: 8 }   # Tempo (flex)

  - id: module_basic
    name: Standard Module
    slot: 5 # Module
    stat_lines:
      - { stat: 0, value: 40 }  # Hull (flex 1)
      - { stat: 1, value: 8 }   # Output (flex 2)
      - { stat: 2, value: 8 }   # Plating (flex 3)

  # --- Bag items (ilvl 2-3 alternatives) ---

  - id: frame_reinforced
    name: Reinforced Frame
    slot: 0
    stat_lines:
      - { stat: 0, value: 100 } # Hull (primary, higher)
      - { stat: 2, value: 8 }   # Plating (secondary, lower)
      - { stat: 2, value: 16 }  # Plating (flex, defensive)

  - id: weapon_sharpened
    name: Sharpened Weapon
    slot: 2
    stat_lines:
      - { stat: 1, value: 30 }  # Output (primary, higher)
      - { stat: 5, value: 14 }  # Mastery (secondary)
      - { stat: 5, value: 14 }  # Mastery (flex, spec-focused)

  - id: module_combat
    name: Combat Module
    slot: 5
    stat_lines:
      - { stat: 1, value: 14 }  # Output (flex 1)
      - { stat: 1, value: 12 }  # Output (flex 2)
      - { stat: 5, value: 12 }  # Mastery (flex 3)
