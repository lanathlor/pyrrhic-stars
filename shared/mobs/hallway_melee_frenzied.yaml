# Hallway Melee: Frenzied variant
# More aggressive BT with cleave ability and faster attacks.
# Targets low-HP players when possible.

abilities:
  # Reach matches melee_slash (2.5). The mob's melee gate (target_in_melee_range)
  # uses the LONGEST melee range, so a longer cleave makes the mob commit (and
  # whiff) melee_slash from the 2.5-3.0 dead zone. Cleave stays distinct via its
  # wide 270 deg cone and higher damage, hitting more clustered targets.
  - name: cleave
    type: melee
    target: nearest
    telegraph_time: 0.3
    execute_time: 0.2
    cooldown_time: 3.0
    base_weight: 40
    max_range: 2.5
    face_target: true
    melee_range: 2.5
    melee_damage: 52
    melee_cone_deg: 270
    damage_source: 1

ability_overrides:
  melee_slash:
    telegraph_time: 0.3
    cooldown_time: 0.3
    damage: 60

tree:
  reactive_selector:
    - sequence: [is_dead, stop]
    - sequence: [phase_transitioning, wait_transition]
    - sequence: ["!has_target", aggro_or_patrol]
    - sequence: ["!in_leash_range", leash_reset]
    - sequence: [is_committed, wait_ability]
    # Cleave when multiple targets nearby
    - sequence: ["players_in_aoe(3)", has_los, "ability_ready(cleave)", "commit(cleave)", wait_ability]
    # Melee slash
    - sequence: [target_in_melee_range, has_los, "ability_ready(melee_slash)", "commit(melee_slash)", wait_ability]
    # Relentlessly dash onto the lowest-HP target (healer/weakened pressure)
    - sequence: ["any_below_hp_pct(50)", set_target_lowest_hp, "dash(0.6)"]
    # Otherwise dash to close the gap on kiters
    - sequence: ["target_beyond(3)", "dash(0.6)"]
    - chase
