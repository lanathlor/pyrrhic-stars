# Hallway Ranged: Frenzied variant
# Twin-lock: fires its salvo at the two nearest players at once, with a tight
# telegraph, and circle-strafes between volleys. Adds heavy pressure on healers
# and anyone caught grouped up.

abilities:
  - name: twin_salvo
    type: ranged
    target: nearest
    telegraph_time: 0.3
    execute_time: 0.1
    cooldown_time: 1.8
    base_weight: 200
    min_range: 0
    track_target: true
    projectile_origin_y: 1.2
    multi_target_count: 2
    damage_source: 2
    pattern:
      emitters:
        - type: targeted
          count: 1
          waves: 3
          wave_interval: 0.12
          aim_at_target: true
          projectile:
            speed: 18
            damage: 22
            lifetime: 4

tree:
  reactive_selector:
    - sequence: [is_dead, stop]
    - sequence: [phase_transitioning, wait_transition]
    - sequence: ["!has_target", aggro_or_patrol]
    - sequence: ["!in_leash_range", leash_reset]
    - sequence: [is_committed, wait_ability]      # hold during a volley
    - sequence: [has_los, attack]                 # twin-lock salvo (or base energy_bolt)
    - sequence: ["target_beyond(5)", strafe]      # circle-strafe between volleys
    - chase
