name: guard_captain
tier: 3
max_health: 2000
move_speed: 4.0
radius: 1.0
anti_repeat: 2.0

abilities:
  - name: melee_swipe
    type: melee
    target: nearest
    telegraph_time: 1.2
    execute_time: 0.3
    cooldown_time: 3.0
    base_weight: 30
    max_range: 3.0
    face_target: true
    melee_range: 3.0
    melee_damage: 25.0
    melee_cone_deg: 180
    damage_source: 1

  - name: fireball_burst
    type: ranged
    target: farthest
    telegraph_time: 1.0
    execute_time: 0.1
    cooldown_time: 12.0
    base_weight: 25
    min_range: 3.0
    face_target: false
    track_target: true
    projectile_origin_y: 1.5
    damage_source: 2
    pattern:
      emitters:
        - type: cone
          count: 5
          waves: 3
          wave_interval: 0.2
          arc_angle: 40
          projectile:
            speed: 12
            damage: 10
            lifetime: 3
        - type: radial
          count: 12
          waves: 2
          wave_interval: 0.15
          offset_per_wave: 15
          projectile:
            speed: 6
            damage: 8
            lifetime: 4
            angular_velocity: 22.92

  - name: void_barrage
    type: ranged
    target: nearest
    telegraph_time: 1.3
    execute_time: 0.1
    cooldown_time: 14.0
    base_weight: 15
    min_range: 0
    face_target: false
    track_target: true
    projectile_origin_y: 0.0
    damage_source: 2
    pattern:
      emitters:
        - type: ring_contract
          count: 12
          waves: 1
          start_radius: 12
          projectile:
            speed: 5
            damage: 10
            lifetime: 3
        - type: cone
          count: 7
          waves: 3
          wave_interval: 0.15
          arc_angle: 50
          offset_per_wave: 8
          projectile:
            speed: 10
            damage: 7
            lifetime: 2.5

  - name: ground_slam
    type: aoe
    target: nearest
    telegraph_time: 1.5
    execute_time: 0.1
    cooldown_time: 12.0
    base_weight: 15
    max_range: 7.5
    face_target: true
    aoe_radius: 5.0
    aoe_damage: 35.0
    damage_source: 3

  - name: bull_charge
    type: charge
    target: nearest
    telegraph_time: 1.0
    cooldown_time: 15.0
    base_weight: 15
    min_range: 6.0
    face_target: true
    charge_speed: 12.0
    charge_damage: 35.0
    charge_max_distance: 15.0
    charge_hit_radius: 2.0
    charge_stop_on_wall: true
    charge_stop_on_obstacle: true
    damage_source: 4

phases:
  - hp_threshold_pct: 0.6
    transition_time: 1.5
    move_speed: 5.0
    cooldown_override: 0.5
    ability_overrides:
      melee_swipe:
        telegraph_time: 0.9
        cooldown_time: 2.0
      fireball_burst:
        telegraph_time: 0.8
        cooldown_time: 8.0
      void_barrage:
        telegraph_time: 1.0
        cooldown_time: 9.0
      ground_slam:
        telegraph_time: 1.2
        aoe_radius: 6.0
        cooldown_time: 8.0
      bull_charge:
        telegraph_time: 0.8
        charge_speed: 14.0
        charge_max_distance: 18.0
        cooldown_time: 10.0

  - hp_threshold_pct: 0.3
    transition_time: 1.5
    move_speed: 6.0
    cooldown_override: 0.4
    ability_overrides:
      melee_swipe:
        telegraph_time: 0.7
        damage: 30.0
        cooldown_time: 1.5
      fireball_burst:
        telegraph_time: 0.6
        cooldown_time: 6.0
      void_barrage:
        telegraph_time: 0.8
        cooldown_time: 7.0
      ground_slam:
        telegraph_time: 1.0
        aoe_radius: 7.0
        damage: 45.0
        cooldown_time: 6.0
      bull_charge:
        telegraph_time: 0.6
        damage: 40.0
        charge_speed: 16.0
        charge_max_distance: 20.0
        cooldown_time: 7.0

tree:
  reactive_selector:
    # --- Lifecycle guards ---
    - sequence: [is_dead, stop]
    - sequence: [phase_transitioning, wait_transition]
    - sequence: ["!has_target", aggro_or_patrol]
    - sequence: ["!in_leash_range", leash_reset]
    # Active ability in progress — don't interrupt
    - sequence: [is_casting, wait_ability]

    # === Phase 3: Enraged — priority cascade, melee filler ===
    - sequence:
        - phase_eq(3)
        - selector:
            - sequence: ["target_beyond(10)", has_los, "ability_ready(bull_charge)", "cast(bull_charge)", wait_ability]
            - sequence: ["ability_ready(ground_slam)", "cast(ground_slam)", wait_ability]
            - sequence: [has_los, "ability_ready(void_barrage)", "cast(void_barrage)", wait_ability]
            - sequence: [has_los, "ability_ready(fireball_burst)", "cast(fireball_burst)", wait_ability]
            - sequence: [target_in_melee_range, has_los, "ability_ready(melee_swipe)", "cast(melee_swipe)", wait_ability]
            - chase

    # === Phase 2: Aggressive — big abilities on CD, melee filler ===
    - sequence:
        - phase_eq(2)
        - selector:
            - sequence: ["target_beyond(8)", has_los, "ability_ready(bull_charge)", "cast(bull_charge)", wait_ability]
            - sequence: ["ability_ready(ground_slam)", "cast(ground_slam)", wait_ability]
            - sequence: ["target_beyond(3)", has_los, "ability_ready(fireball_burst)", "cast(fireball_burst)", wait_ability]
            - sequence: [has_los, "ability_ready(void_barrage)", "cast(void_barrage)", wait_ability]
            - sequence: [target_in_melee_range, has_los, "ability_ready(melee_swipe)", "cast(melee_swipe)", wait_ability]
            - chase

    # === Phase 1: Methodical — melee focused, big abilities gated ===
    - selector:
        - sequence: [target_in_melee_range, has_los, "ability_ready(melee_swipe)", "cast(melee_swipe)", wait_ability]
        - sequence: ["players_in_aoe(5)", "ability_ready(ground_slam)", "cast(ground_slam)", wait_ability]
        - sequence: ["target_beyond(10)", has_los, "ability_ready(bull_charge)", "cast(bull_charge)", wait_ability]
        - sequence: ["target_beyond(3)", has_los, "ability_ready(fireball_burst)", "cast(fireball_burst)", wait_ability]
        - chase
