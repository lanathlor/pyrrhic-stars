name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.5.1"

jobs:
  # --- Test: Server ---

  lint-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: server
          args: --concurrency=2 ./...

  fmt-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum
      - name: goimports check
        working-directory: server
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          OUT=$("$(go env GOPATH)/bin/goimports" -l cmd/ internal/)
          if [ -n "$OUT" ]; then
            echo "Files need formatting:" >&2
            echo "$OUT" >&2
            exit 1
          fi

  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum
      - name: go test
        working-directory: server
        run: go test ./... -count=1

  # --- Test: Landing ---

  lint-landing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/landing/pnpm-lock.yaml
      - name: install & check
        working-directory: web/landing
        run: |
          pnpm install --frozen-lockfile
          pnpm run check

  # --- Test: Client ---

  lint-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: gdlint
        working-directory: client
        run: |
          pip install --quiet "gdtoolkit==4.*"
          gdlint scripts/ scenes/
          cd tests/ && gdlint .

  fmt-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: gdformat check
        working-directory: client
        run: |
          pip install --quiet "gdtoolkit==4.*"
          gdformat --check scripts/ scenes/ tests/

  funlen-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: check function length
        working-directory: client
        run: python3 scripts/tools/check_func_length.py scripts/ scenes/

  test-client:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5.1
    # GdUnit in CI can be flaky — drop continue-on-error once stable.
    continue-on-error: true
    env:
      DISPLAY: ":0"
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - name: cache godot import
        uses: actions/cache@v5
        with:
          path: client/.godot/
          key: godot-import-${{ env.GODOT_VERSION }}-${{ github.ref }}
          restore-keys: |
            godot-import-${{ env.GODOT_VERSION }}-
      - name: import & test
        working-directory: client
        run: |
          godot --headless --import
          godot --headless -s addons/gdUnit4/bin/GdUnitCmdTool.gd -a res://tests --ignoreHeadlessMode

  # --- Build: Client ---

  build-client-linux:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5.1
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - name: cache godot import
        uses: actions/cache@v5
        with:
          path: client/.godot/
          key: godot-import-${{ env.GODOT_VERSION }}-${{ github.ref }}
          restore-keys: |
            godot-import-${{ env.GODOT_VERSION }}-
      - name: link export templates
        # The godot-ci image ships templates under /root, but GitHub runs
        # container jobs with HOME=/github/home, so Godot can't find them.
        run: |
          mkdir -p "$HOME/.local/share/godot/export_templates"
          ln -sfn "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" \
                  "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
      - name: export Linux
        run: |
          mkdir -p build/linux
          cd client
          godot --headless --import
          # Godot 4.5.x may crash during post-export cleanup (signal 11) even
          # though the pack file was written successfully. Ignore the exit code
          # and verify the output file exists.
          godot --headless --export-release "Linux" ../build/linux/pyrrhic-stars.x86_64 || true
          test -f ../build/linux/pyrrhic-stars.x86_64 || (echo "Export failed — binary not found" && exit 1)
      - uses: actions/upload-artifact@v6
        with:
          name: pyrrhic-stars-linux-${{ github.sha }}
          path: build/linux/
          retention-days: 30

  build-client-windows:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5.1
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - name: cache godot import
        uses: actions/cache@v5
        with:
          path: client/.godot/
          key: godot-import-${{ env.GODOT_VERSION }}-${{ github.ref }}
          restore-keys: |
            godot-import-${{ env.GODOT_VERSION }}-
      - name: link export templates
        # The godot-ci image ships templates under /root, but GitHub runs
        # container jobs with HOME=/github/home, so Godot can't find them.
        run: |
          mkdir -p "$HOME/.local/share/godot/export_templates"
          ln -sfn "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" \
                  "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
      - name: export Windows
        run: |
          mkdir -p build/windows
          cd client
          godot --headless --import
          godot --headless --export-release "Windows" ../build/windows/pyrrhic-stars.exe || true
          test -f ../build/windows/pyrrhic-stars.exe || (echo "Export failed — binary not found" && exit 1)
      - uses: actions/upload-artifact@v6
        with:
          name: pyrrhic-stars-windows-${{ github.sha }}
          path: build/windows/
          retention-days: 30

  # --- Build: Server ---

  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum
      - name: cross-compile gateway
        working-directory: server
        run: |
          mkdir -p ../build/server-linux ../build/server-windows
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../build/server-linux/gateway ./cmd/gateway
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o ../build/server-windows/gateway.exe ./cmd/gateway
      - uses: actions/upload-artifact@v6
        with:
          name: pyrrhic-stars-server-${{ github.sha }}
          path: |
            build/server-linux/
            build/server-windows/
          retention-days: 30

  # --- Build: Landing image ---

  build-landing-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: read
    env:
      IMAGE: ghcr.io/${{ github.repository }}/landing
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - name: detect landing changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            landing:
              - 'web/landing/**'
      - name: log in to GHCR
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/') ||
          steps.changes.outputs.landing == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build & push
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/') ||
          steps.changes.outputs.landing == 'true'
        uses: docker/build-push-action@v7
        with:
          context: web/landing
          push: true
          build-args: |
            PUBLIC_DOWNLOAD_LINUX=https://github.com/${{ github.repository }}/releases/latest/download/pyrrhic-stars-linux.x86_64
            PUBLIC_DOWNLOAD_WINDOWS=https://github.com/${{ github.repository }}/releases/latest/download/pyrrhic-stars-windows.exe
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  # --- Build: Gateway image ---

  build-gateway-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: read
    env:
      IMAGE: ghcr.io/${{ github.repository }}/gateway
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - name: detect server changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            server:
              - 'server/**'
      - name: log in to GHCR
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/') ||
          steps.changes.outputs.server == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build & push
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/') ||
          steps.changes.outputs.server == 'true'
        uses: docker/build-push-action@v7
        with:
          context: server
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  # --- Build: Combat-logs image ---

  build-combat-logs-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: read
    env:
      IMAGE: ghcr.io/${{ github.repository }}/combat-logs
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - name: detect combat-logs changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            combat-logs:
              - 'web/combat-logs/**'
      - name: log in to GHCR
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/') ||
          steps.changes.outputs.combat-logs == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build & push
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/') ||
          steps.changes.outputs.combat-logs == 'true'
        uses: docker/build-push-action@v7
        with:
          context: web/combat-logs
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  # --- Release ---

  # Derive the next semver from conventional commits since the last vX.Y.Z tag.
  # Standard mapping: breaking -> major, feat -> minor, fix/perf -> patch.
  # First release is pinned to v0.1.0. Outputs an empty release_type when there
  # is nothing releasable (in which case only the nightly release is refreshed).
  version:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      new_tag: ${{ steps.compute.outputs.new_tag }}
      release_type: ${{ steps.compute.outputs.release_type }}
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
          fetch-depth: 0
          fetch-tags: true
      - name: compute next version
        id: compute
        run: |
          set -euo pipefail
          last=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)
          if [ -z "$last" ]; then
            new_tag="v0.1.0"; release_type="minor"
          else
            range="${last}..HEAD"
            subjects=$(git log --no-merges --pretty=format:%s "$range" || true)
            bodies=$(git log --no-merges --pretty=format:%B "$range" || true)
            bump="none"
            if printf '%s\n' "$subjects" | grep -qE '^[a-z]+(\([^)]+\))?!:' \
               || printf '%s\n' "$bodies" | grep -qE 'BREAKING[ -]CHANGE'; then
              bump="major"
            elif printf '%s\n' "$subjects" | grep -qE '^feat(\([^)]+\))?:'; then
              bump="minor"
            elif printf '%s\n' "$subjects" | grep -qE '^(fix|perf)(\([^)]+\))?:'; then
              bump="patch"
            fi
            ver="${last#v}"
            major="${ver%%.*}"; rest="${ver#*.}"; minor="${rest%%.*}"; patch="${rest#*.}"
            case "$bump" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
            esac
            new_tag="v${major}.${minor}.${patch}"
            release_type="$bump"; [ "$bump" = "none" ] && release_type=""
          fi
          echo "new_tag=$new_tag"           >> "$GITHUB_OUTPUT"
          echo "release_type=$release_type" >> "$GITHUB_OUTPUT"
          echo "Resolved: last=${last:-<none>} -> new_tag=$new_tag release_type=${release_type:-<none>}"

  # Download artifacts produced by the build jobs and rename them to stable,
  # version-independent filenames used by every release. The same asset names
  # back the permanent /releases/latest/download/<name> URLs.
  release-nightly:
    runs-on: ubuntu-latest
    needs: [build-client-linux, build-client-windows, build-server]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-linux-${{ github.sha }}
          path: dl/linux
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-windows-${{ github.sha }}
          path: dl/windows
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-server-${{ github.sha }}
          path: dl/server
      - name: assemble release assets
        run: |
          set -euo pipefail
          mkdir -p assets
          cp dl/linux/pyrrhic-stars.x86_64        assets/pyrrhic-stars-linux.x86_64
          cp dl/windows/pyrrhic-stars.exe         assets/pyrrhic-stars-windows.exe
          cp dl/server/server-linux/gateway       assets/pyrrhic-stars-gateway-linux
          cp dl/server/server-windows/gateway.exe assets/pyrrhic-stars-gateway-windows.exe
      - name: refresh nightly tag + release
        # Delete the old rolling release+tag so the nightly tag and assets move
        # cleanly to the current commit, then recreate it.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete nightly --cleanup-tag --yes --repo "$GITHUB_REPOSITORY" || true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly (main)
          prerelease: true
          target_commitish: ${{ github.sha }}
          make_latest: false
          body: >
            Rolling build from the latest commit on `main`
            (${{ github.sha }}). Unstable; for the latest tested build use the
            most recent versioned release.
          files: assets/*

  release-stable:
    runs-on: ubuntu-latest
    needs: [version, build-client-linux, build-client-windows, build-server]
    if: github.ref == 'refs/heads/main' && needs.version.outputs.release_type != ''
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-linux-${{ github.sha }}
          path: dl/linux
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-windows-${{ github.sha }}
          path: dl/windows
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-server-${{ github.sha }}
          path: dl/server
      - name: assemble release assets
        run: |
          set -euo pipefail
          mkdir -p assets
          cp dl/linux/pyrrhic-stars.x86_64        assets/pyrrhic-stars-linux.x86_64
          cp dl/windows/pyrrhic-stars.exe         assets/pyrrhic-stars-windows.exe
          cp dl/server/server-linux/gateway       assets/pyrrhic-stars-gateway-linux
          cp dl/server/server-windows/gateway.exe assets/pyrrhic-stars-gateway-windows.exe
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: ${{ needs.version.outputs.new_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          files: assets/*

  # A PR against main from a branch in this repo (not a fork) publishes a
  # per-PR prerelease so the build under review is downloadable. Fork PRs are
  # excluded: their GITHUB_TOKEN is read-only and cannot publish releases.
  release-pr:
    runs-on: ubuntu-latest
    needs: [build-client-linux, build-client-windows, build-server]
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-linux-${{ github.sha }}
          path: dl/linux
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-windows-${{ github.sha }}
          path: dl/windows
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-server-${{ github.sha }}
          path: dl/server
      - name: assemble release assets
        run: |
          set -euo pipefail
          mkdir -p assets
          cp dl/linux/pyrrhic-stars.x86_64        assets/pyrrhic-stars-linux.x86_64
          cp dl/windows/pyrrhic-stars.exe         assets/pyrrhic-stars-windows.exe
          cp dl/server/server-linux/gateway       assets/pyrrhic-stars-gateway-linux
          cp dl/server/server-windows/gateway.exe assets/pyrrhic-stars-gateway-windows.exe
      - name: refresh PR prerelease tag
        # Move the pr-<n> tag + assets to the current head on each push.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "pr-${{ github.event.pull_request.number }}" --cleanup-tag --yes --repo "$GITHUB_REPOSITORY" || true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: pr-${{ github.event.pull_request.number }}
          name: "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          prerelease: true
          target_commitish: ${{ github.event.pull_request.head.sha }}
          make_latest: false
          body: >
            Preview build for PR #${{ github.event.pull_request.number }}
            (head ${{ github.event.pull_request.head.sha }}). Prerelease for
            review/testing; removed automatically when the PR is closed.
          files: assets/*
