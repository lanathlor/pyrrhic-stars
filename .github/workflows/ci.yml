name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.5.1"

jobs:
  # --- Test: Server ---

  lint-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: server
          args: --concurrency=2 ./...

  fmt-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum
      - name: goimports check
        working-directory: server
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          OUT=$("$(go env GOPATH)/bin/goimports" -l cmd/ internal/)
          if [ -n "$OUT" ]; then
            echo "Files need formatting:" >&2
            echo "$OUT" >&2
            exit 1
          fi

  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum
      - name: go test
        working-directory: server
        run: go test ./... -count=1

  # --- Test: Landing ---

  lint-landing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/landing/pnpm-lock.yaml
      - name: install & check
        working-directory: web/landing
        run: |
          pnpm install --frozen-lockfile
          pnpm run check

  # --- Test: Client ---

  lint-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: gdlint
        working-directory: client
        run: |
          pip install --quiet "gdtoolkit==4.*"
          gdlint scripts/ scenes/
          cd tests/ && gdlint .

  fmt-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: gdformat check
        working-directory: client
        run: |
          pip install --quiet "gdtoolkit==4.*"
          gdformat --check scripts/ scenes/ tests/

  funlen-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: check function length
        working-directory: client
        run: python3 scripts/tools/check_func_length.py scripts/ scenes/

  # Resolve once whether client files changed (gates the Godot test job on PRs)
  # and derive a content-addressed import-cache key from the asset git tree. The
  # key changes only when committed asset bytes change, so the cache stays warm
  # across branches and commits instead of being rebuilt per ref.
  client-setup:
    runs-on: ubuntu-latest
    # paths-filter calls the GitHub API to list a PR's changed files.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      client_changed: ${{ steps.filter.outputs.client }}
      import_key: ${{ steps.key.outputs.import_key }}
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - name: detect client changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            client:
              - 'client/**'
      - name: derive import-cache key
        id: key
        run: echo "import_key=godot-import-v1-${GODOT_VERSION}-$(git rev-parse 'HEAD:client/assets')" >> "$GITHUB_OUTPUT"

  # Build the Godot import cache once and publish it to the Actions cache. The
  # three downstream Godot jobs restore it instead of each running a ~10-min cold
  # reimport. restore-keys lets an asset change reimport only the changed files
  # on top of the previous cache, then save under the new exact key. On an exact
  # hit this job is a fast no-op verify.
  import-client:
    runs-on: ubuntu-latest
    needs: [client-setup]
    container:
      image: barichello/godot-ci:4.5.1
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - name: restore/save import cache
        uses: actions/cache@v5
        with:
          path: |
            client/.godot/
            client/**/*.import
          key: ${{ needs.client-setup.outputs.import_key }}
          restore-keys: |
            godot-import-v1-${{ env.GODOT_VERSION }}-
      - name: import
        working-directory: client
        run: godot --headless --import

  test-client:
    runs-on: ubuntu-latest
    needs: [client-setup, import-client]
    # On PRs, skip the Godot test job unless client/** changed. On main and tags
    # it always runs (release gating depends on it).
    if: needs.client-setup.outputs.client_changed == 'true' || github.event_name != 'pull_request'
    container:
      image: barichello/godot-ci:4.5.1
    env:
      DISPLAY: ":0"
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - name: restore import cache
        uses: actions/cache/restore@v5
        with:
          path: |
            client/.godot/
            client/**/*.import
          key: ${{ needs.client-setup.outputs.import_key }}
          restore-keys: |
            godot-import-v1-${{ env.GODOT_VERSION }}-
      - name: import & test
        working-directory: client
        run: |
          godot --headless --import
          godot --headless -s addons/gdUnit4/bin/GdUnitCmdTool.gd -a res://tests --ignoreHeadlessMode

  # --- Build: Client ---

  build-client-linux:
    runs-on: ubuntu-latest
    needs:
      [
        client-setup,
        import-client,
        lint-client,
        fmt-client,
        funlen-client,
        test-client,
      ]
    # test-client is skipped on PRs that don't touch client/** (see its `if`).
    # Still build for the per-PR release as long as the cheap client checks and
    # the import job passed; only a real test failure blocks the build.
    if: >
      !cancelled() &&
      needs.client-setup.result == 'success' &&
      needs.import-client.result == 'success' &&
      needs.lint-client.result == 'success' &&
      needs.fmt-client.result == 'success' &&
      needs.funlen-client.result == 'success' &&
      needs.test-client.result != 'failure'
    container:
      image: barichello/godot-ci:4.5.1
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - name: restore import cache
        uses: actions/cache/restore@v5
        with:
          path: |
            client/.godot/
            client/**/*.import
          key: ${{ needs.client-setup.outputs.import_key }}
          restore-keys: |
            godot-import-v1-${{ env.GODOT_VERSION }}-
      - name: link export templates
        # The godot-ci image ships templates under /root, but GitHub runs
        # container jobs with HOME=/github/home, so Godot can't find them.
        run: |
          mkdir -p "$HOME/.local/share/godot/export_templates"
          ln -sfn "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" \
                  "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
      - name: export Linux
        run: |
          mkdir -p build/linux
          cd client
          godot --headless --import
          # Godot 4.5.x may crash during post-export cleanup (signal 11) even
          # though the pack file was written successfully. Ignore the exit code
          # and verify the output file exists.
          godot --headless --export-release "Linux" ../build/linux/pyrrhic-stars.x86_64 || true
          test -f ../build/linux/pyrrhic-stars.x86_64 || (echo "Export failed — binary not found" && exit 1)
      - uses: actions/upload-artifact@v6
        with:
          name: pyrrhic-stars-linux-${{ github.sha }}
          path: build/linux/
          retention-days: 30

  build-client-windows:
    runs-on: ubuntu-latest
    needs:
      [
        client-setup,
        import-client,
        lint-client,
        fmt-client,
        funlen-client,
        test-client,
      ]
    # test-client is skipped on PRs that don't touch client/** (see its `if`).
    # Still build for the per-PR release as long as the cheap client checks and
    # the import job passed; only a real test failure blocks the build.
    if: >
      !cancelled() &&
      needs.client-setup.result == 'success' &&
      needs.import-client.result == 'success' &&
      needs.lint-client.result == 'success' &&
      needs.fmt-client.result == 'success' &&
      needs.funlen-client.result == 'success' &&
      needs.test-client.result != 'failure'
    container:
      image: barichello/godot-ci:4.5.1
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - name: restore import cache
        uses: actions/cache/restore@v5
        with:
          path: |
            client/.godot/
            client/**/*.import
          key: ${{ needs.client-setup.outputs.import_key }}
          restore-keys: |
            godot-import-v1-${{ env.GODOT_VERSION }}-
      - name: link export templates
        # The godot-ci image ships templates under /root, but GitHub runs
        # container jobs with HOME=/github/home, so Godot can't find them.
        run: |
          mkdir -p "$HOME/.local/share/godot/export_templates"
          ln -sfn "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" \
                  "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
      - name: export Windows
        run: |
          mkdir -p build/windows
          cd client
          godot --headless --import
          godot --headless --export-release "Windows" ../build/windows/pyrrhic-stars.exe || true
          test -f ../build/windows/pyrrhic-stars.exe || (echo "Export failed — binary not found" && exit 1)
      - uses: actions/upload-artifact@v6
        with:
          name: pyrrhic-stars-windows-${{ github.sha }}
          path: build/windows/
          retention-days: 30

  # --- Build: Server ---

  build-server:
    runs-on: ubuntu-latest
    needs: [lint-server, fmt-server, test-server]
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum
      - name: cross-compile gateway
        working-directory: server
        run: |
          mkdir -p ../build/server-linux ../build/server-windows
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../build/server-linux/gateway ./cmd/gateway
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o ../build/server-windows/gateway.exe ./cmd/gateway
      - uses: actions/upload-artifact@v6
        with:
          name: pyrrhic-stars-server-${{ github.sha }}
          path: |
            build/server-linux/
            build/server-windows/
          retention-days: 30

  # --- Build: Landing image ---

  build-landing-image:
    runs-on: ubuntu-latest
    needs: [lint-landing]
    permissions:
      contents: read
      packages: write
      pull-requests: read
    env:
      IMAGE: ghcr.io/${{ github.repository }}/landing
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - name: detect landing changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            landing:
              - 'web/landing/**'
      - name: log in to GHCR
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/') ||
          steps.changes.outputs.landing == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build & push
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/') ||
          steps.changes.outputs.landing == 'true'
        uses: docker/build-push-action@v7
        with:
          context: web/landing
          push: true
          build-args: |
            PUBLIC_DOWNLOAD_LINUX=https://github.com/${{ github.repository }}/releases/latest/download/pyrrhic-stars-linux.x86_64
            PUBLIC_DOWNLOAD_WINDOWS=https://github.com/${{ github.repository }}/releases/latest/download/pyrrhic-stars-windows.exe
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  # --- Build: Gateway image ---

  build-gateway-image:
    runs-on: ubuntu-latest
    needs: [lint-server, fmt-server, test-server]
    permissions:
      contents: read
      packages: write
      pull-requests: read
    env:
      IMAGE: ghcr.io/${{ github.repository }}/gateway
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - name: detect server changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            server:
              - 'server/**'
              - 'shared/**'
      - name: log in to GHCR
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/') ||
          steps.changes.outputs.server == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build & push
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/') ||
          steps.changes.outputs.server == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  # --- Build: Combat-logs image ---

  build-combat-logs-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: read
    env:
      IMAGE: ghcr.io/${{ github.repository }}/combat-logs
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - name: detect combat-logs changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            combat-logs:
              - 'web/combat-logs/**'
      - name: log in to GHCR
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/') ||
          steps.changes.outputs.combat-logs == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build & push
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/') ||
          steps.changes.outputs.combat-logs == 'true'
        uses: docker/build-push-action@v7
        with:
          context: web/combat-logs
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  # --- Promote: record the deployed version for ArgoCD ---

  # After the images are pushed, write this commit SHA into deploy/version.json.
  # The pyrrhic-stars ApplicationSet (git generator) watches the file and rolls the
  # deployment to the matching immutable chart + image. Pushes made with
  # GITHUB_TOKEN do not retrigger workflows; [skip ci] is belt-and-suspenders.
  update-deploy-version:
    runs-on: ubuntu-latest
    needs: [build-gateway-image, build-combat-logs-image, build-landing-image]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
      - name: write deploy/version.json
        run: |
          mkdir -p deploy
          printf '{ "version": "%s" }\n' "${{ github.sha }}" > deploy/version.json
      - name: commit & push if changed
        run: |
          if git diff --quiet -- deploy/version.json; then
            echo "version.json unchanged; nothing to do"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/version.json
          git commit -m "chore(deploy): release ${{ github.sha }} [skip ci]"
          git push

  # --- Release ---

  # Derive the next semver from conventional commits since the last vX.Y.Z tag.
  # Standard mapping: breaking -> major, feat -> minor, fix/perf -> patch.
  # First release is pinned to v0.1.0. Outputs an empty release_type when there
  # is nothing releasable (in which case only the nightly release is refreshed).
  version:
    runs-on: ubuntu-latest
    needs:
      [
        lint-server,
        fmt-server,
        test-server,
        lint-client,
        fmt-client,
        funlen-client,
        test-client,
      ]
    if: github.ref == 'refs/heads/main'
    outputs:
      new_tag: ${{ steps.compute.outputs.new_tag }}
      release_type: ${{ steps.compute.outputs.release_type }}
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
          fetch-depth: 0
          fetch-tags: true
      - name: compute next version
        id: compute
        run: |
          set -euo pipefail
          bash .github/scripts/next-version.sh | tee -a "$GITHUB_OUTPUT"

  # Download artifacts produced by the build jobs and rename them to stable,
  # version-independent filenames used by every release. The same asset names
  # back the permanent /releases/latest/download/<name> URLs.
  release-nightly:
    runs-on: ubuntu-latest
    needs: [build-client-linux, build-client-windows, build-server]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      # Full history + tags so changelog.sh can list changes since the last tag.
      - uses: actions/checkout@v5
        with:
          lfs: false
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-linux-${{ github.sha }}
          path: dl/linux
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-windows-${{ github.sha }}
          path: dl/windows
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-server-${{ github.sha }}
          path: dl/server
      - name: assemble release assets
        run: |
          set -euo pipefail
          mkdir -p assets
          cp dl/linux/pyrrhic-stars.x86_64        assets/pyrrhic-stars-linux.x86_64
          cp dl/windows/pyrrhic-stars.exe         assets/pyrrhic-stars-windows.exe
          cp dl/server/server-linux/gateway       assets/pyrrhic-stars-gateway-linux
          cp dl/server/server-windows/gateway.exe assets/pyrrhic-stars-gateway-windows.exe
      - name: refresh nightly tag + release
        # Delete the old rolling release+tag so the nightly tag and assets move
        # cleanly to the current commit, then recreate it.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete nightly --cleanup-tag --yes --repo "$GITHUB_REPOSITORY" || true
      - name: write release notes
        run: |
          set -euo pipefail
          cat > notes.md <<'EOF'
          Rolling build from the latest commit on `main`.

          > [!WARNING]
          > Unstable bleeding-edge build, refreshed on every push to `main`.
          > For a tested build, use the latest [versioned release](https://github.com/${{ github.repository }}/releases/latest).

          **Commit:** ${{ github.sha }}

          ### Downloads
          | Platform | File |
          | --- | --- |
          | Game · Linux | [pyrrhic-stars-linux.x86_64](https://github.com/${{ github.repository }}/releases/download/nightly/pyrrhic-stars-linux.x86_64) |
          | Game · Windows | [pyrrhic-stars-windows.exe](https://github.com/${{ github.repository }}/releases/download/nightly/pyrrhic-stars-windows.exe) |
          | Server gateway · Linux | [pyrrhic-stars-gateway-linux](https://github.com/${{ github.repository }}/releases/download/nightly/pyrrhic-stars-gateway-linux) |
          | Server gateway · Windows | [pyrrhic-stars-gateway-windows.exe](https://github.com/${{ github.repository }}/releases/download/nightly/pyrrhic-stars-gateway-windows.exe) |

          ## Changes since the last release
          EOF
          bash .github/scripts/changelog.sh >> notes.md
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly (main)
          prerelease: true
          target_commitish: ${{ github.sha }}
          make_latest: false
          body_path: notes.md
          files: assets/*

  release-stable:
    runs-on: ubuntu-latest
    needs: [version, build-client-linux, build-client-windows, build-server]
    if: github.ref == 'refs/heads/main' && needs.version.outputs.release_type != ''
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-linux-${{ github.sha }}
          path: dl/linux
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-windows-${{ github.sha }}
          path: dl/windows
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-server-${{ github.sha }}
          path: dl/server
      - name: assemble release assets
        run: |
          set -euo pipefail
          mkdir -p assets
          cp dl/linux/pyrrhic-stars.x86_64        assets/pyrrhic-stars-linux.x86_64
          cp dl/windows/pyrrhic-stars.exe         assets/pyrrhic-stars-windows.exe
          cp dl/server/server-linux/gateway       assets/pyrrhic-stars-gateway-linux
          cp dl/server/server-windows/gateway.exe assets/pyrrhic-stars-gateway-windows.exe
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: ${{ needs.version.outputs.new_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          files: assets/*

  # A PR against main from a branch in this repo (not a fork) publishes a
  # per-PR prerelease so the build under review is downloadable. Fork PRs are
  # excluded: their GITHUB_TOKEN is read-only and cannot publish releases.
  release-pr:
    runs-on: ubuntu-latest
    needs: [build-client-linux, build-client-windows, build-server]
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    steps:
      # Full history + tags so next-version.sh can compute the projected
      # version this PR would release.
      - uses: actions/checkout@v5
        with:
          lfs: false
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-linux-${{ github.sha }}
          path: dl/linux
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-windows-${{ github.sha }}
          path: dl/windows
      - uses: actions/download-artifact@v6
        with:
          name: pyrrhic-stars-server-${{ github.sha }}
          path: dl/server
      - name: assemble release assets
        run: |
          set -euo pipefail
          mkdir -p assets
          cp dl/linux/pyrrhic-stars.x86_64        assets/pyrrhic-stars-linux.x86_64
          cp dl/windows/pyrrhic-stars.exe         assets/pyrrhic-stars-windows.exe
          cp dl/server/server-linux/gateway       assets/pyrrhic-stars-gateway-linux
          cp dl/server/server-windows/gateway.exe assets/pyrrhic-stars-gateway-windows.exe
      - name: compute RC version
        id: rc
        # Name the prerelease v<next>-rc.<N>: <next> is the version this PR
        # would release, <N> increments per push (read from the prior name).
        # The git tag stays pr-<n> so the close cleanup remains reliable.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          eval "$(bash .github/scripts/next-version.sh)"   # -> new_tag, release_type, last_tag
          prev=$(gh release view "pr-${PR}" --json name --jq .name --repo "$GITHUB_REPOSITORY" 2>/dev/null || true)
          prevN=$(printf '%s' "$prev" | sed -n 's/.*-rc\.\([0-9][0-9]*\).*/\1/p')
          N=$(( ${prevN:-0} + 1 ))
          echo "rc_name=${new_tag}-rc.${N}" >> "$GITHUB_OUTPUT"
          echo "Computed RC ${new_tag}-rc.${N} (prev name: ${prev:-<none>})"
          # Drop the prior PR prerelease so assets + target refresh cleanly.
          gh release delete "pr-${PR}" --cleanup-tag --yes --repo "$GITHUB_REPOSITORY" || true
      - name: write release notes
        run: |
          set -euo pipefail
          cat > notes.md <<'EOF'
          Preview build for **PR #${{ github.event.pull_request.number }}** — release candidate `${{ steps.rc.outputs.rc_name }}`.

          > [!WARNING]
          > Prerelease for review/testing. Refreshed on every push to the PR and removed when it closes.

          **Head commit:** ${{ github.event.pull_request.head.sha }}

          ### Downloads
          | Platform | File |
          | --- | --- |
          | Game · Linux | [pyrrhic-stars-linux.x86_64](https://github.com/${{ github.repository }}/releases/download/pr-${{ github.event.pull_request.number }}/pyrrhic-stars-linux.x86_64) |
          | Game · Windows | [pyrrhic-stars-windows.exe](https://github.com/${{ github.repository }}/releases/download/pr-${{ github.event.pull_request.number }}/pyrrhic-stars-windows.exe) |
          | Server gateway · Linux | [pyrrhic-stars-gateway-linux](https://github.com/${{ github.repository }}/releases/download/pr-${{ github.event.pull_request.number }}/pyrrhic-stars-gateway-linux) |
          | Server gateway · Windows | [pyrrhic-stars-gateway-windows.exe](https://github.com/${{ github.repository }}/releases/download/pr-${{ github.event.pull_request.number }}/pyrrhic-stars-gateway-windows.exe) |

          ## Changes in this PR
          EOF
          bash .github/scripts/changelog.sh \
            "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> notes.md
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: pr-${{ github.event.pull_request.number }}
          name: ${{ steps.rc.outputs.rc_name }}
          prerelease: true
          target_commitish: ${{ github.event.pull_request.head.sha }}
          make_latest: false
          body_path: notes.md
          files: assets/*
