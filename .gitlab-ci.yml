stages:
  - test
  - build

variables:
  GODOT_VERSION: "4.5.1"

# --- Test Stage: Server ---

lint-server:
  stage: test
  image: golangci/golangci-lint:v2.12-alpine
  variables:
    GOGC: "50"
  script:
    - cd server
    - golangci-lint run --concurrency=2 ./...

fmt-server:
  stage: test
  image: golang:1.25-alpine
  script:
    - go install golang.org/x/tools/cmd/goimports@latest
    - cd server
    - |
      OUT=$(goimports -l cmd/ internal/)
      if [ -n "$OUT" ]; then
        echo "Files need formatting:" >&2
        echo "$OUT" >&2
        exit 1
      fi

test-server:
  stage: test
  image: golang:1.25-alpine
  script:
    - cd server
    - go test ./... -count=1

# --- Test Stage: Client ---

lint-client:
  stage: test
  image: python:3.12-alpine
  script:
    - pip install --quiet gdtoolkit==4.*
    - cd client
    - gdlint scripts/ scenes/
    - cd tests/ && gdlint .

fmt-client:
  stage: test
  image: python:3.12-alpine
  script:
    - pip install --quiet gdtoolkit==4.*
    - cd client
    - gdformat --check scripts/ scenes/ tests/

funlen-client:
  stage: test
  image: python:3.12-alpine
  script:
    - cd client
    - python3 scripts/tools/check_func_length.py scripts/ scenes/

test-client:
  stage: test
  image: barichello/godot-ci:${GODOT_VERSION}
  variables:
    DISPLAY: ":0"
  cache:
    key: godot-import-${GODOT_VERSION}
    paths:
      - client/.godot/
  before_script:
    - cd client
    - godot --headless --import
  script:
    - godot --headless -s addons/gdUnit4/bin/GdUnitCmdTool.gd -a res://tests --ignoreHeadlessMode
  allow_failure: true  # GdUnit in CI can be flaky — remove once stable

# --- Build Stage ---

build-client-linux:
  stage: build
  image: barichello/godot-ci:${GODOT_VERSION}
  cache:
    key: godot-import-${GODOT_VERSION}
    paths:
      - client/.godot/
  before_script:
    - mkdir -p build/linux
    - cd client
    - godot --headless --import
  script:
    # Godot 4.5.x may crash during post-export cleanup (signal 11) even though
    # the pack file was written successfully. Ignore the exit code and verify
    # the output file exists.
    - godot --headless --export-release "Linux" ../build/linux/codex-online.x86_64 || true
    - test -f ../build/linux/codex-online.x86_64 || (echo "Export failed — binary not found" && exit 1)
  artifacts:
    name: "codex-online-linux-${CI_COMMIT_SHORT_SHA}"
    paths:
      - build/linux/
    expire_in: 30 days

build-client-windows:
  stage: build
  image: barichello/godot-ci:${GODOT_VERSION}
  cache:
    key: godot-import-${GODOT_VERSION}
    paths:
      - client/.godot/
  before_script:
    - mkdir -p build/windows
    - cd client
    - godot --headless --import
  script:
    - godot --headless --export-release "Windows" ../build/windows/codex-online.exe || true
    - test -f ../build/windows/codex-online.exe || (echo "Export failed — binary not found" && exit 1)
  artifacts:
    name: "codex-online-windows-${CI_COMMIT_SHORT_SHA}"
    paths:
      - build/windows/
    expire_in: 30 days

build-server:
  stage: build
  image: golang:1.25-alpine
  script:
    - cd server
    - mkdir -p ../build/server-linux ../build/server-windows
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../build/server-linux/gateway ./cmd/gateway
    - CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o ../build/server-windows/gateway.exe ./cmd/gateway
  artifacts:
    name: "codex-online-server-${CI_COMMIT_SHORT_SHA}"
    paths:
      - build/server-linux/
      - build/server-windows/
    expire_in: 30 days
