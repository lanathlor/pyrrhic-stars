      - id: enemy_hp
        rank: 2
    win_rate:
      min: 0.05
      max: 0.90
  - name: fortified_5
    conditions:
      - id: enemy_hp
        rank: 5
    win_rate:
      min: 0.0
      max: 0.80
  - name: tempered
    conditions:
      - id: tempered
        rank: 1
    win_rate:
      min: 0.10
      max: 0.95
  - name: volatile
    conditions:
      - id: volatile
        rank: 1
    win_rate:
      min: 0.10
      max: 0.95
  - name: tempered_volatile
    conditions:
      - id: tempered
        rank: 1
      - id: volatile
        rank: 1
