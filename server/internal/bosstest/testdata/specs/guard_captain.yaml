# Standard composition: 1 tank, 1 healer, 3 DPS
compositions:
  - name: all_sweaty
    classes: [arcanotechnicien, vanguard, vanguard, gunner, blade_dancer]
    specs: [harmonist, shield, blade, assault, multi_blade]
    profiles: [sweaty, sweaty, sweaty, sweaty, sweaty]
    win_rate:
      min: 0.80
  - name: mixed_average
    classes: [arcanotechnicien, vanguard, vanguard, gunner, blade_dancer]
    specs: [harmonist, shield, blade, assault, multi_blade]
    profiles: [average, average, average, average, average]
    win_rate:
      min: 0.80
      max: 1.0
  - name: all_bad
    classes: [arcanotechnicien, vanguard, vanguard, gunner, blade_dancer]
    specs: [harmonist, shield, blade, assault, multi_blade]
    profiles: [bad, bad, bad, bad, bad]
    loadouts:
      - [siphon_pulse, mending_beam, mending_surge, restoration_matrix, life_swap, vital_bloom]
      - []
      - []
      - []
      - []
    win_rate:
      min: 0.70
      max: 1.0

win_rate:
  min: 0.80
  max: 1.0

duration:
  min_seconds: 15
  max_seconds: 600

phase_reach:
  - phase: 2
    min_rate: 0.60
  - phase: 3
    min_rate: 0.30

tree_health:
  max_dead_nodes: 10
  max_cold_nodes: 25

spec_balance:
  max_damage_share_sigma: 0.30

ability_stats:
  - ability: melee_swipe
    max_kill_rate: 0.50
  - ability: ground_slam
    max_kill_rate: 0.60
  - ability: bull_charge
    max_kill_rate: 0.60
