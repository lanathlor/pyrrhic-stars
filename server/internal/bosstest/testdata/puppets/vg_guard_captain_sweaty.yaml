class: vanguard
bosses: [guard_captain]
profiles: [sweaty]

# Sweaty vanguard: off-tank, DPS loss is acceptable for survival.
# cleave is MeleeArc 6 range — must stay in melee to deal damage.
# Uses has_reacted (DodgeGreed=0.70) for melee telegraphs to maximize uptime,
# has_reacted_quick for AoE/charge where staying provides zero benefit.
# Block during melee telegraphs. Full rotation with vortex (80% DR).

tree:
  reactive_selector:
    # Charge: no benefit to tanking — dodge immediately while attacking
    - sequence: [has_reacted_quick, in_charge_path, "strafe_charge(cleave)"]
    # AoE: flee immediately while attacking
    - sequence: [has_reacted_quick, in_aoe_danger, "flee_aoe(cleave)"]
    # Melee telegraph: DodgeGreed delays dodge for uptime, then block + circle
    - sequence: [has_reacted, in_melee_danger, should_use_defensive, "strafe_melee_cone(vg_block)"]
    # Melee telegraph: circle behind boss while attacking (no block roll)
    - sequence: [has_reacted, in_melee_danger, "strafe_melee_cone(cleave)"]
    # Ranged telegraph: void_barrage targets nearest (often us) — strafe
    - sequence: [has_reacted_quick, targeted_by_ranged, "strafe_ranged(cleave)"]
    # Projectiles: immediate sidestep while attacking
    - sequence: [projectile_incoming, "sidestep_projectile(cleave)"]
    # Positioning: advance to melee range (blocked during AoE/charge by out_of_melee)
    - sequence: [out_of_melee, advance]
    # Rotation: vortex (80% DR + AoE damage)
    - sequence: ["can_cast(vortex)", "cast(vortex)"]
    # Rotation: execution (high damage cone)
    - sequence: ["can_cast(execution)", "cast(execution)"]
    # Rotation: upheaval
    - sequence: ["can_cast(upheaval)", "cast(upheaval)"]
    # Filler: cleave combo
    - "cast(cleave)"
