class: gunner
bosses: [guard_captain]
profiles: [bad]

# Bad gunner: slow reactions, no projectile awareness.
# But still has basic gamer instinct: backpedals and shoots when boss is close.
# 1.0s reaction time means most telegraphs are already executing before noticing.
# Rotation is near-perfect — overclock + fire_shot is trivial to execute.
# DPS loss comes from mechanic disruption, not rotation quality.

tree:
  reactive_selector:
    # Charge: late reaction, bare strafe (stops shooting while panicking)
    - sequence: [has_reacted, in_charge_path, strafe_charge]
    # Ranged telegraph: late reaction, bare strafe
    - sequence: [has_reacted, targeted_by_ranged, strafe_ranged]
    # No projectile dodge — doesn't notice incoming projectiles
    # No AoE dodge — at 10m usually safe, and wouldn't react anyway
    # Kiting: even bad players backpedal when a melee mob is in their face
    - sequence: [too_close, kite_and_shoot]
    # Positioning: walk toward boss when too far
    - sequence: [too_far, advance]
    # Rotation: overclock on cooldown (single button, easy)
    - sequence: ["can_cast(overclock)", "cast(overclock)"]
    # Tactical reload when magazine is low
    - sequence: [should_reload, "cast(reload)"]
    # Filler: hold M1
    - "cast(fire_shot)"
