class: gunner
bosses: [guard_captain]
profiles: [bad]

# Bad gunner: slow reactions, knows mechanics exist but reacts late.
# Tries to dodge AoE and charge (late), doesn't dodge projectiles well.
# Still has gamer instinct: kites melee, maintains rotation.

tree:
  reactive_selector:
    # Charge: late reaction, bare strafe
    - sequence: [has_reacted, in_charge_path, strafe_charge]
    # AoE: late reaction but tries to flee
    - sequence: [has_reacted, in_aoe_danger, flee_aoe]
    # Ranged telegraph: late reaction, bare strafe
    - sequence: [has_reacted, targeted_by_ranged, strafe_ranged]
    # No projectile dodge -- doesn't track individual projectiles
    # Kiting: backpedal when boss is close
    - sequence: [too_close, kite_and_shoot]
    # Positioning
    - sequence: [too_far, advance]
    # Rotation
    - sequence: ["can_commit(overclock)", "commit(overclock)"]
    - sequence: [should_reload, "commit(reload)"]
    - "commit(fire_shot)"
