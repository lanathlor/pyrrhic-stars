class: vanguard
spec: blade
bosses: [guard_captain]
profiles: [bad]

# Bad vanguard: face-tanks most things. 1.0s reaction means most telegraphs
# land before any response. Never blocks. Doesn't dodge melee cone, projectiles,
# or ranged attacks. Still mashes attack while fleeing big mechanics.
# Rotation is near-perfect — vanguard buttons are easy to press.
# DPS loss comes from eating mechanics and dying, not rotation quality.

tree:
  reactive_selector:
    # Charge: late reaction, mash attack while dodging
    - sequence: [has_reacted, in_charge_path, "strafe_charge(cleave)"]
    # AoE: late reaction, mash attack while fleeing
    - sequence: [has_reacted, in_aoe_danger, "flee_aoe(cleave)"]
    # No melee cone dodge — doesn't circle behind boss
    # No block — doesn't know to use defensives
    # No ranged dodge — doesn't notice
    # No projectile dodge
    # Positioning: walk back into melee range
    - sequence: [out_of_melee, advance]
    # Full rotation — even bad players press their cooldowns
    - sequence: ["can_cast(vortex)", "cast(vortex)"]
    - sequence: ["can_cast(execution)", "cast(execution)"]
    - sequence: ["can_cast(upheaval)", "cast(upheaval)"]
    # Filler: cleave spam
    - "cast(cleave)"
