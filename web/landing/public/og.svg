<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1318"/>
      <stop offset="100%" stop-color="#171c22"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6e90b5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6e90b5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6e90b5" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="528" width="1200" height="1" fill="url(#line)"/>
  <text x="80" y="270" font-family="Inter, system-ui, sans-serif" font-size="84" font-weight="700" fill="#e6ebef" letter-spacing="-2">
    Pyrrhic Stars
  </text>
  <text x="80" y="340" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="400" fill="#90a0ad">
    A co-op action game where every class plays
  </text>
  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="400" fill="#90a0ad">
    a different genre.
  </text>
  <g transform="translate(80, 480)" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#6e90b5">
    <text x="0" y="0">FPS</text>
    <text x="80" y="0">·</text>
    <text x="105" y="0">Souls-like</text>
    <text x="245" y="0">·</text>
    <text x="270" y="0">Channeler</text>
    <text x="410" y="0">·</text>
    <text x="435" y="0">Deployables</text>
    <text x="595" y="0">·</text>
    <text x="620" y="0">Blades</text>
    <text x="725" y="0">·</text>
    <text x="750" y="0">Auras</text>
  </g>
</svg>
